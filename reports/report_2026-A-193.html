        <style>
            body { font-family: 'Noto Sans TC', sans-serif; background-color: #e5e5e5; color: #111; margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; }
            
            /* Interactive Toolbar */
            .toolbar { 
                width: 850px; 
                background: #fff; 
                padding: 15px 25px; 
                margin-bottom: 20px; 
                box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
                border-radius: 8px; 
                display: flex; 
                gap: 15px; 
                align-items: center;
                box-sizing: border-box;
            }
            .toolbar-title { font-weight: 900; color: #0b2447; margin-right: auto; }
            .btn { 
                padding: 8px 16px; 
                border-radius: 6px; 
                border: 1px solid #ddd; 
                background: #f8f9fa; 
                cursor: pointer; 
                font-family: inherit; 
                font-weight: 700; 
                transition: all 0.2s;
                font-size: 14px;
            }
            .btn:hover { background: #e9ecef; border-color: #ccc; }
            .btn.active { background: #0b2447; color: #fff; border-color: #0b2447; }
            
            .slider-group { display: flex; align-items: center; gap: 10px; margin-left: 20px; border-left: 1px solid #ddd; padding-left: 20px; }
            .slider-group label { font-weight: 700; font-size: 14px; color: #444; min-width: 120px; }
            input[type=range] { width: 150px; cursor: pointer; }

            .card { background: #fafafa; width: 850px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); overflow: hidden; position: relative; }
            
            /* Top Banner */
            .banner { background-color: #0b2447; color: #fff; padding: 10px 20px; font-weight: 900; font-size: 24px; letter-spacing: 1px; display: flex; justify-content: space-between; }
            .banner .league { color: #e4d804; }
            
            /* Header */
            .header { text-align: center; padding: 20px 40px 10px; }
            .header h1 { font-size: 44px; margin: 0; font-weight: 900; letter-spacing: -1px; }
            .header-info { font-size: 20px; color: #444; margin-bottom: 15px; display: flex; justify-content: center; gap: 30px; font-weight: 700; }
            
            /* Match Info */
            .match-info { display: flex; justify-content: center; align-items: center; gap: 0; margin-bottom: 20px; width: 100%; }
            .team-box { width: 220px; padding: 10px 15px; border-radius: 8px; font-weight: 900; font-size: 22px; color: white; text-align: center; flex-shrink: 0; }
            .score-box { font-size: 48px; font-weight: 900; display: flex; align-items: center; gap: 0; width: 200px; justify-content: center; flex-shrink: 0; }
            .score-box .score { flex: 1; text-align: center; width: 70px; }
            .score-box .hyphen { flex: 0; color: #888; }
            .date-box { text-align: left; margin-left: 20px; border-left: 2px solid #ddd; padding-left: 20px; }
            .date-box .title { color: #888; font-weight: bold; font-size: 16px; letter-spacing: 1px; text-transform: uppercase; }
            .date-box .date { font-size: 28px; font-weight: 900; color: #333; }
            
            /* Metrics Row */
            .stats-row { display: flex; justify-content: space-around; padding: 10px 10px; margin-bottom: 25px; flex-wrap: wrap; gap: 5px; }
            .donut-container { margin-bottom: 10px; }
            .donut-label { font-size: 18px; font-weight: 700; margin-bottom: 10px; color: #333; white-space: pre-line; height: 44px; display: flex; align-items: flex-end; justify-content: center; }
            
            /* Main Content Area */
            .main-content { display: flex; justify-content: space-between; padding: 0 40px 10px; gap: 40px; }
            
            /* Footer */
            .footer { background: #f0f0f0; padding: 15px 40px; border-top: 1px solid #eee; font-size: 12px; color: #888; text-align: center; }
            
            /* Plot Container */
            .plot-container { flex: 1; text-align: center; }
            .plot-title { font-size: 28px; font-weight: 900; margin-bottom: 5px; }
            .plot-subtitle { font-size: 14px; color: #333; margin-bottom: 15px; font-weight: 700; }
            .plot-subtitle span.red { color: #D32F2F; }
            .zone-svg { background: #fafafa; }
            
            /* Details Container */
            .details-container { flex: 1; }
            .details-title { font-size: 28px; font-weight: 900; margin-bottom: 5px; text-align: center; }
            .details-subtitle { font-size: 14px; color: #555; margin-bottom: 20px; font-weight: 700; text-align: center; }
            
            .missed-list { list-style-type: none; padding: 0; margin: 0; }
            .missed-list li { margin-bottom: 20px; }
            .missed-list .rank { font-size: 18px; font-weight: bold; float: left; width: 25px; }
            .missed-list .content { margin-left: 25px; font-size: 16px; line-height: 1.5; }
            .missed-list .context { font-weight: bold; display: flex; align-items: center; }
            .missed-list .players { color: #444; }
            .missed-list .call-result { margin-top: 5px; font-weight: 700; display: flex; align-items: center; gap: 5px; flex-wrap: nowrap; }
            .badge-cross { border: 1px solid #333; padding: 2px 4px; border-radius: 4px; font-size: 11px; white-space: nowrap; }
            .badge-check { border: 1px solid #333; padding: 2px 4px; border-radius: 4px; font-size: 11px; white-space: nowrap; }
            .run-impact { background: #1976D2; color: white; padding: 2px 6px; border-radius: 4px; font-size: 14px; font-weight: 900; white-space: nowrap; }

            /* Tooltip Styling */
            .tooltip {
                position: absolute;
                background: #fff;
                border: 1px solid #ccc;
                border-radius: 8px;
                padding: 12px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.2);
                pointer-events: none;
                z-index: 1000;
                display: none;
                width: max-content;
                min-width: 260px;
                max-width: 320px;
                font-family: 'Noto Sans TC', sans-serif;
            }
            .tooltip .context { font-weight: bold; display: flex; align-items: center; font-size: 14px; margin-bottom: 5px; }
            .tooltip .players { color: #444; font-size: 13px; margin-bottom: 8px; line-height: 1.4; }
            .tooltip .call-result { display: flex; align-items: center; gap: 5px; font-size: 12px; flex-wrap: nowrap; }
            .tooltip .run-impact { color: white; padding: 2px 6px; border-radius: 4px; font-size: 13px; font-weight: 900; white-space: nowrap; }
            .tooltip .badge-cross, .tooltip .badge-check { border: 1px solid #333; padding: 1px 4px; border-radius: 3px; }

            /* Hide toolbar and tooltip for print/screenshot */
            @media print {
                .toolbar, .tooltip { display: none !important; }
                body { padding: 0; }
            }

p": 0.9255500000000001, "sz_bottom": 0.4671, "favor_team": "中信兄弟", "is_correct": true}];
            const svgW = 400;
            const svgH = 450;
            const xMin = -0.5;
            const xMax = 0.5;
            const zMin = 0.15;
            const zMax = 1.25;
            const SZ_BOTTOM = 0.486;
            const SZ_TOP = 0.963;
            const awayColor = "#FFD700";
            const homeColor = "#EA5504";
            const awayTeam = "中信兄弟";
            const homeTeam = "統一7-ELEVEn獅";
            
            let isShowAll = false;
            let currentTolerance = 0;

            function mapX(x) { return (xMax - x) / (xMax - xMin) * svgW; }
            function mapZ(z) { return svgH - ((z - zMin) / (zMax - zMin) * svgH); }

            function generateBaseSVG(bases) {
                const b1 = bases[0] ? "#D32F2F" : "#fff";
                const b2 = bases[1] ? "#D32F2F" : "#fff";
                const b3 = bases[2] ? "#D32F2F" : "#fff";
                return `
                <svg width="24" height="24" viewBox="0 0 50 50" style="vertical-align: middle; margin: 0 5px;">
                    <polygon points="25,5 35,15 25,25 15,15" fill="${b2}" stroke="#333" stroke-width="1.5"/>
                    <polygon points="35,15 45,25 35,35 25,25" fill="${b1}" stroke="#333" stroke-width="1.5"/>
                    <polygon points="15,15 25,25 15,35 5,25" fill="${b3}" stroke="#333" stroke-width="1.5"/>
                </svg>`;
            }

            function updateDonut(idPrefix, percentage, subLabel) {
                const circle = document.getElementById(idPrefix + '-circle');
                const text = document.getElementById(idPrefix + '-text');
                const sub = document.getElementById(idPrefix + '-sub');
                
                const radius = 60;
                const circumference = 2 * 3.14159 * radius;
                const offset = circumference - (percentage / 100) * circumference;
                
                if (circle) circle.setAttribute('stroke-dashoffset', offset);
                if (text) text.textContent = percentage.toFixed(1) + '%';
                if (subLabel && sub) sub.textContent = subLabel;
            }

            function updateFavor(favorVal) {
                const circle = document.getElementById('favor-circle');
                const text = document.getElementById('favor-text');
                const sub = document.getElementById('favor-sub');
                
                const absVal = Math.abs(favorVal);
                const team = favorVal >= 0 ? homeTeam : awayTeam;
                const color = favorVal >= 0 ? homeColor : awayColor;
                const sign = "+";
                
                if (circle) circle.setAttribute('fill', color);
                if (text) text.textContent = sign + absVal.toFixed(2);
                if (sub) {
                    sub.textContent = team;
                    sub.style.color = color;
                }
            }

            function renderDots(tolerance, showAll) {
                const container = document.getElementById('dots-container');
                const tooltip = document.getElementById('tooltip');
                const title = document.getElementById('plot-title-text');
                container.innerHTML = '';
                
                title.innerText = showAll ? '所有判決球點' : '所有誤判球點';

                const effectiveMissed = allCalls.filter(p => !p.is_correct && p.dist_cm >= tolerance);
                effectiveMissed.sort((a, b) => b.impact - a.impact);

                function drawPitch(p, isMissed) {
                    const zNorm = SZ_BOTTOM + (p.z - p.sz_bottom) * (SZ_TOP - SZ_BOTTOM) / (p.sz_top - p.sz_bottom);
                    const cx = mapX(p.x);
                    const cy_val = mapZ(zNorm);
                    
                    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    circle.setAttribute("cx", cx);
                    circle.setAttribute("cy", cy_val);
                    circle.setAttribute("r", "14.76");
                    circle.style.cursor = "pointer";
                    
                    if (!isMissed) {
                        circle.setAttribute("fill", "transparent");
                        circle.setAttribute("stroke", p.called === "STRIKE" ? "rgba(255, 128, 128, 0.8)" : "rgba(128, 200, 128, 0.8)");
                        circle.setAttribute("stroke-width", "2");
                        container.appendChild(circle);
                    } else {
                        const color = (p.called === "STRIKE") ? "rgba(255, 128, 128, 0.9)" : "rgba(128, 200, 128, 0.9)";
                        circle.setAttribute("fill", color);
                        
                        circle.onmouseover = (e) => {
                            const fColor = (p.favor_team === homeTeam) ? homeColor : awayColor;
                            const calledLabel = p.called === 'STRIKE' ? '好球' : '壞球';
                            tooltip.innerHTML = `
                                <div class="context">
                                    ${p.inning_half} ${p.inning_num} ${generateBaseSVG(p.bases)} ${p.outs} 出局 ${p.count_b}-${p.count_s}
                                </div>
                                <div class="players">
                                    投手: ${p.pitcher}<br>
                                    打者: ${p.batter}<br>
                                    備註: ${p.content}
                                </div>
                                <div class="call-result">
                                    <span class="badge-cross">☒ ${p.dist_cm.toFixed(1)} cm</span>
                                    <span class="badge-check">${calledLabel}</span>
                                    <span class="run-impact" style="background-color: ${fColor};">+${p.impact.toFixed(2)} ${p.favor_team}</span>
                                </div>
                            `;
                            tooltip.style.display = 'block';
                        };
                        circle.onmousemove = (e) => {
                            tooltip.style.left = (e.pageX + 15) + 'px';
                            tooltip.style.top = (e.pageY + 15) + 'px';
                        };
                        circle.onmouseout = () => { tooltip.style.display = 'none'; };
                        
                        const mIndex = effectiveMissed.indexOf(p);
                        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                        text.setAttribute("x", cx);
                        text.setAttribute("y", cy_val + 4);
                        text.setAttribute("text-anchor", "middle");
                        text.setAttribute("font-size", "12");
                        text.setAttribute("font-weight", "bold");
                        text.setAttribute("fill", "#000");
                        text.textContent = mIndex + 1;
                        text.style.pointerEvents = "none";
                        
                        container.appendChild(circle);
                        container.appendChild(text);
                    }
                }

                if (showAll) {
                    allCalls.forEach(p => {
                        const isCorrect = p.is_correct || p.dist_cm < tolerance;
                        if (isCorrect) drawPitch(p, false);
                    });
                }

                const reverseMissed = [...effectiveMissed].reverse();
                reverseMissed.forEach(p => {
                    drawPitch(p, true);
                });
            }

                const list = document.getElementById('missed-list');
                list.innerHTML = '';
                
                missed.slice(0, 3).forEach((mc, i) => {
                    const fColor = mc.favor_team === homeTeam ? homeColor : awayColor;
                    const item = document.createElement('li');
                    item.innerHTML = `
                        <div class="rank">${i+1}:</div>
                        <div class="content">
                            <div class="context">
                                ${mc.inning_half} ${mc.inning_num} ${generateBaseSVG(mc.bases)} ${mc.outs} 出局 ${mc.count_b}-${mc.count_s}
                            </div>
                            <div class="players">
                                投手: ${mc.pitcher}<br>
                                打者: ${mc.batter}
                            </div>
                            <div class="call-result">
                                <span class="badge-cross">☒ ${mc.dist_cm.toFixed(1)} cm</span>
                                <span class="badge-check">${mc.called === 'STRIKE' ? '好球' : '壞球'}</span>
                                <span class="run-impact" style="background-color: ${fColor};">+${mc.impact.toFixed(2)} ${mc.favor_team}</span>
                            </div>
                        </div>
                    `;
                    list.appendChild(item);
                });
            }

            function updateTolerance(val) {
                currentTolerance = parseFloat(val);
                document.getElementById('tolerance-val').innerText = currentTolerance.toFixed(1);
                
                const effectiveMissed = allCalls.filter(p => !p.is_correct && p.dist_cm >= currentTolerance);
                effectiveMissed.sort((a, b) => b.impact - a.impact);

                const effectiveCorrect = allCalls.filter(p => p.is_correct || p.dist_cm < currentTolerance);
                
                const total = allCalls.length;
                const overallAcc = (effectiveCorrect.length / total) * 100;
                
                const trueBalls = allCalls.filter(p => p.true_call === 'BALL');
                const ballCorrect = trueBalls.filter(p => p.called === 'BALL' || p.dist_cm < currentTolerance);
                const ballAcc = trueBalls.length > 0 ? (ballCorrect.length / trueBalls.length) * 100 : 100;
                
                const trueStrikes = allCalls.filter(p => p.true_call === 'STRIKE');
                const strikeCorrect = trueStrikes.filter(p => p.called === 'STRIKE' || p.dist_cm < currentTolerance);
                const strikeAcc = trueStrikes.length > 0 ? (strikeCorrect.length / trueStrikes.length) * 100 : 100;
                
                let homeGain = 0;
                let awayGain = 0;
                effectiveMissed.forEach(p => {
                    if (p.favor_team === homeTeam) homeGain += p.impact;
                    else awayGain += p.impact;
                });
                const netFavor = homeGain - awayGain;
                
                const overallAccText = document.getElementById('overall-acc-text');
                const overallSub = document.getElementById('overall-sub');
                const overallCircle = document.getElementById('overall-circle');
                if (overallAccText) overallAccText.textContent = overallAcc.toFixed(1) + '%';
                if (overallSub) overallSub.textContent = `${effectiveCorrect.length}/${total}`;
                if (overallCircle) {
                    const radius = 60;
                    const circumference = 2 * 3.14159 * radius;
                    const offset = circumference - (overallAcc / 100) * circumference;
                    overallCircle.setAttribute('stroke-dashoffset', offset);
                }
                
                updateDonut('ball', ballAcc, `${ballCorrect.length}/${trueBalls.length}`);
                updateDonut('strike', strikeAcc, `${strikeCorrect.length}/${trueStrikes.length}`);
                updateFavor(netFavor);
                
                renderDots(currentTolerance, isShowAll);
                renderDetails(effectiveMissed);
            }

            function showMissed() {
                isShowAll = false;
                document.getElementById('btn-missed').classList.add('active');
                document.getElementById('btn-all').classList.remove('active');
                renderDots(currentTolerance, false);
            }

            function showAll() {
                isShowAll = true;
                document.getElementById('btn-all').classList.add('active');
                document.getElementById('btn-missed').classList.remove('active');
                renderDots(currentTolerance, true);
            }

            window.onload = () => {
                updateTolerance(0);
            };
        </script>

            </div>
